<div id="astronomy-tile-root"></div>
<script>
(() => {
    const state = __INITIAL_STATE__;
    const root = document.getElementById("astronomy-tile-root");
    if (!root) {
        return;
    }

    const labels = state.labels || {};
    const icons = window.assets || {};
    const instanceName = state.instanceName || state.title || "";
    const headerTitleWidth = Math.max(116, Math.min(300, Math.round(instanceName.length * 9.4 + 30)));
    const summary = state.summary || {};
    const metrics = state.metrics || {};
    const panels = state.panels || {};
    const status = state.status || {};
    const details = state.details || {};
    const themeConfig = state.theme || {};
    const searchParams = new URLSearchParams(window.location.search);
    const hostMarginTop = Number.parseInt(searchParams.get("margintop") || "", 10);
    const hostMarginSide = Number.parseInt(searchParams.get("marginside") || "", 10);
    const hostMarginBottom = Number.parseInt(searchParams.get("marginbottom") || "", 10);

    const nav = [
        { key: "overview", icon: "☀️" },
        { key: "moon", icon: "🌙" },
        { key: "position", icon: "🧭" },
        { key: "twilight", icon: "🌆" },
        { key: "details", icon: "📋" }
    ];

    const escapeHtml = (value) => String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

    const normalizeColor = (value, fallback) => {
        const normalized = String(value || "").trim();
        if (normalized === "") {
            return fallback;
        }
        if (normalized.startsWith("#") || normalized.startsWith("rgb")) {
            return normalized;
        }
        if (/^[0-9a-fA-F]{6}$/.test(normalized) || /^[0-9a-fA-F]{3}$/.test(normalized)) {
            return `#${normalized}`;
        }
        return fallback;
    };

    const parseRgb = (value) => {
        const color = String(value || "").trim();
        if (color.startsWith("#")) {
            const hex = color.slice(1);
            if (hex.length === 3) {
                return {
                    r: parseInt(hex[0] + hex[0], 16),
                    g: parseInt(hex[1] + hex[1], 16),
                    b: parseInt(hex[2] + hex[2], 16)
                };
            }
            if (hex.length === 6) {
                return {
                    r: parseInt(hex.slice(0, 2), 16),
                    g: parseInt(hex.slice(2, 4), 16),
                    b: parseInt(hex.slice(4, 6), 16)
                };
            }
        }

        const rgbMatch = color.match(/rgba?\(([^)]+)\)/i);
        if (!rgbMatch) {
            return null;
        }

        const parts = rgbMatch[1].split(",").map((part) => Number.parseFloat(part.trim()));
        if (parts.length < 3 || parts.some((part) => !Number.isFinite(part))) {
            return null;
        }

        return { r: parts[0], g: parts[1], b: parts[2] };
    };

    const toRgba = (value, alpha) => {
        const rgb = parseRgb(value);
        if (!rgb) {
            return `rgba(0, 0, 0, ${alpha})`;
        }
        return `rgba(${Math.round(rgb.r)}, ${Math.round(rgb.g)}, ${Math.round(rgb.b)}, ${alpha})`;
    };

    const luminance = (value) => {
        const rgb = parseRgb(value);
        if (!rgb) {
            return 1;
        }

        const channel = (component) => {
            const normalized = component / 255;
            return normalized <= 0.03928
                ? normalized / 12.92
                : ((normalized + 0.055) / 1.055) ** 2.4;
        };

        return 0.2126 * channel(rgb.r) + 0.7152 * channel(rgb.g) + 0.0722 * channel(rgb.b);
    };

    const hostTextColor = normalizeColor(searchParams.get("textcolor"), "#111111");

    const renderMetricRows = (rows) => rows.map((row) => `
        <div class="astronomyTile__metric">
            <span class="astronomyTile__metricName">${escapeHtml(row.label)}</span>
            <span class="astronomyTile__metricValue">${escapeHtml(row.value ?? "--")}</span>
        </div>
    `).join("");

    const renderIconImage = (src, className) => src
        ? `<img class="${className}" src="${src}" alt="">`
        : "";

    const getMoonPhaseGlyph = () => {
        const percent = Number(panels.moon?.phasePercent ?? 0);
        const phaseText = String(summary.phase || "").toLowerCase();
        if (percent <= 3) {
            return "🌑";
        }
        if (percent >= 97) {
            return "🌕";
        }
        if (phaseText.includes("increasing") || phaseText.includes("zunehmend")) {
            return percent < 50 ? "🌒" : "🌔";
        }
        if (phaseText.includes("decreasing") || phaseText.includes("abnehmend")) {
            return percent > 50 ? "🌖" : "🌘";
        }
        return "🌙";
    };

    const renderImage = (src, className) => src
        ? `<img class="${className}" src="${src}" alt="">`
        : `<div class="astronomyTile__empty">${escapeHtml(labels.noImage)}</div>`;

    const buildAutoTheme = () => {
        const rootStyles = getComputedStyle(root);
        const bodyStyles = getComputedStyle(document.body);
        const accentColor = normalizeColor(rootStyles.getPropertyValue("--accent-color"), normalizeColor(searchParams.get("accentcolor"), "#00cdab"));
        const contentColor = normalizeColor(rootStyles.getPropertyValue("--content-color"), normalizeColor(searchParams.get("textcolor"), bodyStyles.color || "#111111"));
        const cardColor = normalizeColor(rootStyles.getPropertyValue("--card-color"), normalizeColor(searchParams.get("cardcolor"), "#ffffff"));
        const fontFamily = bodyStyles.fontFamily || rootStyles.fontFamily || "sans-serif";
        const fontSize = Number.parseInt(searchParams.get("fontsize") || "", 10);
        const isDark = luminance(cardColor) < 0.45;

        return {
            variant: isDark ? "auto-dark" : "auto-light",
            accentColor,
            textColor: contentColor,
            mutedTextColor: toRgba(contentColor, isDark ? 0.72 : 0.62),
            panelColor: toRgba(cardColor, isDark ? 0.82 : 0.92),
            panelStrongColor: toRgba(cardColor, isDark ? 0.9 : 0.97),
            borderColor: toRgba(contentColor, isDark ? 0.16 : 0.1),
            surfaceSoft: toRgba(contentColor, isDark ? 0.07 : 0.035),
            surfaceBorder: toRgba(contentColor, isDark ? 0.12 : 0.06),
            tileBgStart: toRgba(accentColor, isDark ? 0.08 : 0.045),
            tileBgEnd: "rgba(0, 0, 0, 0)",
            fontFamily,
            fontSize: Number.isFinite(fontSize) ? fontSize : 14,
            marginTop: Number.isFinite(hostMarginTop) ? hostMarginTop : 16,
            marginSide: Number.isFinite(hostMarginSide) ? hostMarginSide : 12,
            marginBottom: Number.isFinite(hostMarginBottom) ? hostMarginBottom : 12,
            shadow: isDark ? "0 10px 26px rgba(0, 0, 0, 0.18)" : "0 10px 24px rgba(0, 0, 0, 0.05)",
            moonFrameBg: toRgba(cardColor, isDark ? 0.96 : 0.98),
            showHeaderChrome: false,
            headerChromeBg: "transparent",
            headerChromeBorder: "transparent"
        };
    };

    const buildCustomTheme = () => {
        const custom = themeConfig.custom || {};
        const textColor = normalizeColor(custom.textColor, "#F2EBDB");
        const borderColor = normalizeColor(custom.borderColor, "#3A4450");
        const headerTextLuminance = luminance(hostTextColor);
        const headerChromeBg = headerTextLuminance > 0.55
            ? "rgba(10, 22, 37, 0.82)"
            : "rgba(255, 255, 255, 0.82)";
        const headerChromeBorder = headerTextLuminance > 0.55
            ? "rgba(255, 255, 255, 0.12)"
            : "rgba(10, 22, 37, 0.12)";
        const customMarginTop = Number.isFinite(Number(custom.marginTop)) ? Number(custom.marginTop) : 16;
        const customMarginSide = Number.isFinite(Number(custom.marginSide)) ? Number(custom.marginSide) : 12;
        const customMarginBottom = Number.isFinite(Number(custom.marginBottom)) ? Number(custom.marginBottom) : 12;

        return {
            variant: "custom",
            accentColor: normalizeColor(custom.accentColor, "#F0B24F"),
            textColor,
            mutedTextColor: toRgba(textColor, 0.72),
            panelColor: toRgba(normalizeColor(custom.cardColor, "#0A1625"), 0.82),
            panelStrongColor: toRgba(normalizeColor(custom.cardSecondaryColor, "#061018"), 0.92),
            borderColor: toRgba(borderColor, 0.42),
            surfaceSoft: toRgba(textColor, 0.08),
            surfaceBorder: toRgba(borderColor, 0.28),
            tileBgStart: normalizeColor(custom.backgroundStart, "#0C1A2E"),
            tileBgEnd: normalizeColor(custom.backgroundEnd, "#132132"),
            fontFamily: getComputedStyle(document.body).fontFamily || "sans-serif",
            fontSize: Number.isFinite(Number(custom.fontSize)) ? Number(custom.fontSize) : 14,
            marginTop: Math.max(Number.isFinite(hostMarginTop) ? hostMarginTop : 16, customMarginTop),
            marginSide: Math.max(Number.isFinite(hostMarginSide) ? hostMarginSide : 12, customMarginSide),
            marginBottom: Math.max(Number.isFinite(hostMarginBottom) ? hostMarginBottom : 12, customMarginBottom),
            shadow: "0 12px 28px rgba(0, 0, 0, 0.24)",
            moonFrameBg: toRgba(normalizeColor(custom.cardSecondaryColor, "#061018"), 0.9),
            showHeaderChrome: true,
            headerChromeBg,
            headerChromeBorder
        };
    };

    const theme = themeConfig.mode === "custom" ? buildCustomTheme() : buildAutoTheme();

    const themeToStyleString = () => [
        `--accent:${theme.accentColor}`,
        `--accent-soft:${toRgba(theme.accentColor, theme.variant === "custom" ? 0.2 : 0.12)}`,
        `--tile-bg-start:${theme.tileBgStart}`,
        `--tile-bg-end:${theme.tileBgEnd}`,
        `--panel:${theme.panelColor}`,
        `--panel-strong:${theme.panelStrongColor}`,
        `--panel-border:${theme.borderColor}`,
        `--surface-soft:${theme.surfaceSoft}`,
        `--surface-border:${theme.surfaceBorder}`,
        `--text-main:${theme.textColor}`,
        `--text-muted:${theme.mutedTextColor}`,
        `--tile-font-family:${theme.fontFamily}`,
        `--tile-font-size:${theme.fontSize}px`,
        `--shell-padding-top:${theme.marginTop}px`,
        `--shell-padding-side:${theme.marginSide}px`,
        `--shell-padding-bottom:${theme.marginBottom}px`,
        `--tile-shadow:${theme.shadow}`,
        `--moon-frame-bg:${theme.moonFrameBg}`,
        `--header-chrome-bg:${theme.headerChromeBg}`,
        `--header-chrome-border:${theme.headerChromeBorder}`
    ].join(";");

    const renderOverview = () => `
        <div class="astronomyTile__page astronomyTile__page--columns3">
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.currentState)}</div>
                ${renderMetricRows([
                    { label: labels.phase, value: summary.phase },
                    { label: labels.season, value: status.season },
                    { label: labels.day, value: status.isDay ? labels.day : labels.night }
                ])}
            </article>
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.sun)}</div>
                ${renderMetricRows([
                    { label: labels.sunrise, value: summary.sunrise },
                    { label: labels.sunset, value: summary.sunset },
                    { label: labels.altitude, value: metrics.sun?.altitude },
                    { label: labels.azimuth, value: metrics.sun?.azimuth },
                    { label: labels.direction, value: metrics.sun?.direction },
                    { label: labels.radiantPower, value: metrics.sun?.radiantPower }
                ])}
            </article>
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.moonTitle)}</div>
                ${renderMetricRows([
                    { label: labels.moonrise, value: summary.moonrise },
                    { label: labels.moonset, value: summary.moonset },
                    { label: labels.altitude, value: metrics.moon?.altitude },
                    { label: labels.azimuth, value: metrics.moon?.azimuth },
                    { label: labels.direction, value: metrics.moon?.direction },
                    { label: labels.visibility, value: metrics.moon?.visibility }
                ])}
            </article>
        </div>
    `;

    const renderMoon = () => `
        <div class="astronomyTile__page astronomyTile__page--moon">
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.moonInformation)}</div>
                <div class="astronomyTile__moonInfo">
                    <div class="astronomyTile__moonFigure">
                        ${renderImage(panels.moon?.image, "astronomyTile__moonImage")}
                    </div>
                    <div class="astronomyTile__moonFacts">
                        ${renderMetricRows(panels.moon?.infoRows || [])}
                    </div>
                </div>
            </article>
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.nextPhases)}</div>
                <div class="astronomyTile__detailGrid">
                    ${renderMetricRows([
                        { label: labels.phase, value: summary.phase },
                        { label: labels.newMoon, value: panels.moon?.nextEvents?.newmoon },
                        { label: labels.firstQuarter, value: panels.moon?.nextEvents?.firstquarter },
                        { label: labels.fullMoon, value: panels.moon?.nextEvents?.fullmoon },
                        { label: labels.lastQuarter, value: panels.moon?.nextEvents?.lastquarter },
                        { label: labels.direction, value: metrics.moon?.direction },
                        { label: labels.distance, value: metrics.moon?.distance },
                        { label: labels.brightLimbAngle, value: metrics.moon?.brightLimbAngle }
                    ])}
                </div>
            </article>
        </div>
    `;

    const renderPosition = () => `
        <div class="astronomyTile__page astronomyTile__page--position">
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.sunMoonView)}</div>
                <div class="astronomyTile__media astronomyTile__media--position">
                    ${panels.position?.html || `<div class="astronomyTile__empty">${escapeHtml(labels.noView)}</div>`}
                </div>
            </article>
            <article class="astronomyTile__card astronomyTile__card--fill">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.positionInformation)}</div>
                <div class="astronomyTile__detailGrid astronomyTile__detailGrid--position">
                    <div>
                        <div class="astronomyTile__statLabel">${escapeHtml(labels.sun)}</div>
                        ${renderMetricRows(panels.position?.sunRows || [])}
                    </div>
                    <div>
                        <div class="astronomyTile__statLabel">${escapeHtml(labels.moonTitle)}</div>
                        ${renderMetricRows(panels.position?.moonRows || [])}
                    </div>
                </div>
            </article>
        </div>
    `;

    const renderTwilight = () => `
        <div class="astronomyTile__page astronomyTile__page--twilight">
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.twilight)}</div>
                <div class="astronomyTile__twilightInfo">
                    <div class="astronomyTile__twilightFigure">
                        <div class="astronomyTile__media astronomyTile__media--day">
                            ${renderImage(panels.twilight?.dayImage, "astronomyTile__dayImage")}
                        </div>
                    </div>
                    <div class="astronomyTile__twilightFacts">
                        ${renderMetricRows([
                            { label: labels.sunrise, value: panels.twilight?.times?.sunrise },
                            { label: labels.sunset, value: panels.twilight?.times?.sunset },
                            { label: labels.civilStart, value: panels.twilight?.times?.civilStart },
                            { label: labels.civilEnd, value: panels.twilight?.times?.civilEnd },
                            { label: labels.nauticStart, value: panels.twilight?.times?.nauticStart },
                            { label: labels.nauticEnd, value: panels.twilight?.times?.nauticEnd },
                            { label: labels.astronomicStart, value: panels.twilight?.times?.astronomicStart },
                            { label: labels.astronomicEnd, value: panels.twilight?.times?.astronomicEnd }
                        ])}
                    </div>
                </div>
            </article>
            <article class="astronomyTile__card">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.twilightYear)}</div>
                <div class="astronomyTile__media astronomyTile__media--year">
                    ${renderImage(panels.twilight?.yearImage, "astronomyTile__yearImage")}
                </div>
            </article>
        </div>
    `;

    const renderDetails = () => `
        <div class="astronomyTile__page">
            <article class="astronomyTile__card astronomyTile__card--fill">
                <div class="astronomyTile__cardTitle">${escapeHtml(labels.details)}</div>
                <div class="astronomyTile__detailGrid astronomyTile__detailGrid--scroll">
                    ${Object.entries(details).map(([label, value]) => `
                        <div class="astronomyTile__metric">
                            <span class="astronomyTile__metricName">${escapeHtml(label)}</span>
                            <span class="astronomyTile__metricValue">${escapeHtml(value)}</span>
                        </div>
                    `).join("")}
                </div>
            </article>
        </div>
    `;

    const views = {
        overview: renderOverview,
        moon: renderMoon,
        position: renderPosition,
        twilight: renderTwilight,
        details: renderDetails
    };

    let activeView = "overview";

    function render() {
        root.innerHTML = `
            <style>
                html, body {
                    height: 100%;
                    margin: 0;
                    overflow: hidden;
                    padding: 0;
                }

                #astronomy-tile-root {
                    height: 100%;
                    margin: 0;
                    padding: 0;
                    width: 100%;
                }

                .astronomyTile {
                    box-sizing: border-box;
                    color: var(--text-main);
                    font-family: var(--tile-font-family);
                    font-size: var(--tile-font-size);
                    height: 100%;
                    margin: 0;
                    overflow: hidden;
                    padding: 0;
                    position: relative;
                    width: 100%;
                }

                .astronomyTile__chrome {
                    inset: 14px 12px auto 12px;
                    pointer-events: none;
                    position: absolute;
                    z-index: 3;
                }

                .astronomyTile__chromeTitle,
                .astronomyTile__chromeIcon {
                    background: var(--header-chrome-bg);
                    border: 1px solid var(--header-chrome-border);
                    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
                    position: absolute;
                }

                .astronomyTile__chromeTitle {
                    border-radius: 999px;
                    height: 28px;
                    left: 0;
                    top: 0;
                    width: 172px;
                }

                .astronomyTile__chromeIcon {
                    border-radius: 999px;
                    height: 28px;
                    right: 4px;
                    top: 0;
                    width: 28px;
                }

                .astronomyTile__shell {
                    background: linear-gradient(180deg, var(--tile-bg-start) 0%, var(--tile-bg-end) 100%);
                    box-sizing: border-box;
                    display: grid;
                    gap: 12px;
                    grid-template-rows: auto auto 1fr;
                    height: 100%;
                    min-height: 0;
                    overflow: hidden;
                    padding: var(--shell-padding-top) var(--shell-padding-side) var(--shell-padding-bottom);
                    position: relative;
                }

                .astronomyTile__nav {
                    display: grid;
                    gap: 8px;
                    grid-template-columns: repeat(5, minmax(0, 1fr));
                    width: 100%;
                }

                .astronomyTile__navButton {
                    align-items: center;
                    appearance: none;
                    background: var(--surface-soft);
                    border: 1px solid var(--surface-border);
                    border-radius: 999px;
                    color: var(--text-main);
                    cursor: pointer;
                    display: inline-flex;
                    gap: 8px;
                    justify-content: center;
                    min-width: 0;
                    padding: 10px 12px;
                    transition: background 120ms ease, border-color 120ms ease;
                }

                .astronomyTile__navButton.is-active {
                    background: var(--accent-soft);
                    border-color: var(--accent);
                    box-shadow: inset 0 0 0 1px var(--accent);
                }

                .astronomyTile__navIcon {
                    font-size: 18px;
                    line-height: 1;
                }

                .astronomyTile__navLabel {
                    font-size: 11px;
                    font-weight: 700;
                    line-height: 1.1;
                    overflow: hidden;
                    text-align: center;
                    text-overflow: ellipsis;
                    white-space: nowrap;
                }

                .astronomyTile__meta {
                    align-items: start;
                    display: flex;
                    gap: 12px;
                    justify-content: space-between;
                    min-width: 0;
                }

                .astronomyTile__subtitle {
                    align-items: center;
                    color: var(--text-muted);
                    display: inline-flex;
                    gap: 8px;
                    font-size: 0.95em;
                    margin-top: 0;
                }

                .astronomyTile__stamp {
                    color: var(--text-muted);
                    display: grid;
                    font-size: 0.86em;
                    gap: 4px;
                    text-align: right;
                    white-space: nowrap;
                }

                .astronomyTile__metaIcon {
                    display: inline-block;
                    font-size: 16px;
                    line-height: 1;
                }

                .astronomyTile__statusLine {
                    align-items: center;
                    display: inline-flex;
                    gap: 6px;
                    justify-content: flex-end;
                }

                .astronomyTile__statusIcon {
                    display: block;
                    height: 14px;
                    width: 14px;
                }

                .astronomyTile__content {
                    min-height: 0;
                    overflow: auto;
                }

                .astronomyTile__page {
                    box-sizing: border-box;
                    display: grid;
                    gap: 12px;
                    height: 100%;
                    min-height: 0;
                }

                .astronomyTile__page--columns3 {
                    grid-template-columns: repeat(3, minmax(0, 1fr));
                }

                .astronomyTile__page--moon {
                    grid-template-rows: minmax(0, 1.2fr) minmax(0, 0.8fr);
                }

                .astronomyTile__page--twilight {
                    grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
                }

                .astronomyTile__page--position {
                    align-items: start;
                    grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
                }

                .astronomyTile__moonInfo {
                    display: grid;
                    gap: 14px;
                    grid-template-columns: 104px minmax(0, 1fr);
                    min-height: 0;
                }

                .astronomyTile__moonFigure {
                    align-items: center;
                    background: var(--moon-frame-bg);
                    border: 1px solid var(--panel-border);
                    border-radius: 16px;
                    display: flex;
                    justify-content: center;
                    min-height: 0;
                    padding: 12px;
                }

                .astronomyTile__moonFacts,
                .astronomyTile__twilightFacts {
                    display: grid;
                    grid-template-columns: 1fr;
                    min-height: 0;
                }

                .astronomyTile__twilightInfo {
                    display: grid;
                    gap: 14px;
                    grid-template-columns: 172px minmax(0, 1fr);
                    min-height: 0;
                }

                .astronomyTile__card {
                    background: var(--panel);
                    border: 1px solid var(--panel-border);
                    border-radius: 18px;
                    box-shadow: var(--tile-shadow);
                    box-sizing: border-box;
                    display: flex;
                    flex-direction: column;
                    min-height: 0;
                    overflow: hidden;
                    padding: 14px;
                }

                .astronomyTile__card--fill {
                    height: 100%;
                }

                .astronomyTile__cardTitle {
                    font-size: 1.08em;
                    font-weight: 700;
                    margin-bottom: 10px;
                }

                .astronomyTile__metric {
                    align-items: baseline;
                    border-top: 1px solid var(--panel-border);
                    display: flex;
                    gap: 14px;
                    justify-content: space-between;
                    padding: 7px 0;
                }

                .astronomyTile__metric:first-child {
                    border-top: 0;
                    padding-top: 0;
                }

                .astronomyTile__metricName {
                    color: var(--text-muted);
                    font-size: 0.95em;
                }

                .astronomyTile__metricValue {
                    font-size: 0.95em;
                    font-weight: 600;
                    text-align: right;
                    word-break: break-word;
                }

                .astronomyTile__media {
                    align-items: center;
                    background: var(--panel-strong);
                    border: 1px solid var(--panel-border);
                    border-radius: 16px;
                    display: flex;
                    flex: 1 1 auto;
                    justify-content: center;
                    min-height: 0;
                    overflow: hidden;
                    position: relative;
                }

                .astronomyTile__media--position {
                    background: transparent;
                    border: 0;
                    min-height: 176px;
                    padding: 0;
                }

                .astronomyTile__media--day {
                    min-height: 112px;
                    padding: 6px;
                }

                .astronomyTile__media--year {
                    min-height: 0;
                    padding: 10px;
                }

                .astronomyTile__moonImage {
                    display: block;
                    height: 92px;
                    max-height: 92px;
                    max-width: 92px;
                    object-fit: contain;
                    width: 92px;
                }

                .astronomyTile__dayImage,
                .astronomyTile__yearImage {
                    display: block;
                    height: auto;
                    max-height: 100%;
                    max-width: 100%;
                    object-fit: contain;
                    width: 100%;
                }

                .astronomyTile__empty {
                    align-items: center;
                    color: var(--text-muted);
                    display: flex;
                    height: 100%;
                    justify-content: center;
                    padding: 24px;
                    text-align: center;
                    width: 100%;
                }

                .astronomyTile__statLabel {
                    color: var(--text-muted);
                    display: block;
                    font-size: 0.82em;
                    font-weight: 700;
                    letter-spacing: 0.04em;
                    margin-bottom: 4px;
                    text-transform: uppercase;
                }

                .astronomyTile__detailGrid {
                    display: grid;
                    gap: 0 16px;
                    grid-template-columns: repeat(2, minmax(0, 1fr));
                    min-height: 0;
                }

                .astronomyTile__detailGrid--scroll,
                .astronomyTile__detailGrid--position {
                    flex: 1 1 auto;
                    overflow: auto;
                    padding-right: 4px;
                }

                .astronomyTile__detailGrid--position {
                    grid-template-columns: 1fr;
                }

                .astronomyTile__detailGrid--position .astronomyTile__metric {
                    padding: 5px 0;
                }

                .astronomyTile__detailGrid--position .astronomyTile__metricName,
                .astronomyTile__detailGrid--position .astronomyTile__metricValue {
                    font-size: 0.88em;
                }

                .astronomyTile iframe {
                    background: transparent;
                    border: 0;
                    display: block;
                    height: 100%;
                    margin: 0 auto;
                    min-height: 0;
                    width: 100%;
                }

                @media (max-width: 900px) {
                    .astronomyTile__nav {
                        grid-template-columns: repeat(3, minmax(0, 1fr));
                    }

                    .astronomyTile__page--columns3,
                    .astronomyTile__page--position,
                    .astronomyTile__detailGrid {
                        grid-template-columns: 1fr;
                    }
                }
            </style>
            <section class="astronomyTile" style="${themeToStyleString()}">
                ${theme.showHeaderChrome ? `
                    <div class="astronomyTile__chrome">
                        <div class="astronomyTile__chromeTitle" style="width:${headerTitleWidth}px"></div>
                        <div class="astronomyTile__chromeIcon"></div>
                    </div>
                ` : ""}
                <div class="astronomyTile__shell">
                    <nav class="astronomyTile__nav">
                        ${nav.map((item) => `
                            <button class="astronomyTile__navButton ${activeView === item.key ? "is-active" : ""}" data-view="${item.key}">
                                <span class="astronomyTile__navIcon">${item.icon}</span>
                                <span class="astronomyTile__navLabel">${escapeHtml(labels[item.key])}</span>
                            </button>
                        `).join("")}
                    </nav>

                    <div class="astronomyTile__meta">
                        <div class="astronomyTile__subtitle">
                            <span class="astronomyTile__metaIcon">${getMoonPhaseGlyph()}</span>
                            <span>${escapeHtml(summary.phase || "--")}</span>
                        </div>
                        <div class="astronomyTile__stamp">
                            <div class="astronomyTile__statusLine">
                                ${renderIconImage(status.isDay ? icons.iconSun : icons.iconMoon, "astronomyTile__statusIcon")}
                                <span>${escapeHtml(status.isDay ? labels.day : labels.night)}</span>
                            </div>
                            <div>${new Date((state.generatedAt || 0) * 1000).toLocaleString(state.language || "de-DE")}</div>
                        </div>
                    </div>

                    <div class="astronomyTile__content">
                        ${views[activeView]()}
                    </div>
                </div>
            </section>
        `;

        root.querySelectorAll("[data-view]").forEach((button) => {
            button.addEventListener("click", () => {
                activeView = button.getAttribute("data-view") || "overview";
                render();
            });
        });
    }

    render();
})();
</script>
